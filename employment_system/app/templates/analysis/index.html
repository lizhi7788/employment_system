{% extends "base.html" %}

{% block title %}数据分析{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <h4 class="mb-0"><i class="bi bi-graph-up"></i> 数据分析中心</h4>
            <p class="text-muted">对毕业生就业数据进行多维度可视化分析</p>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4">
            <a href="{{ url_for('analysis.employment_rate') }}" class="card stat-card text-decoration-none">
                <div class="stat-icon text-primary"><i class="bi bi-pie-chart"></i></div>
                <div class="stat-label mt-3">就业率分析</div>
                <p class="small text-muted">按学院、专业、年份统计就业率</p>
            </a>
        </div>

        <div class="col-md-4 mb-4">
            <a href="{{ url_for('analysis.salary') }}" class="card stat-card text-decoration-none">
                <div class="stat-icon text-success"><i class="bi bi-currency-yen"></i></div>
                <div class="stat-label mt-3">薪资分析</div>
                <p class="small text-muted">薪资分布、各专业平均薪资对比</p>
            </a>
        </div>

        <div class="col-md-4 mb-4">
            <a href="{{ url_for('analysis.industry') }}" class="card stat-card text-decoration-none">
                <div class="stat-icon text-info"><i class="bi bi-diagram-3"></i></div>
                <div class="stat-label mt-3">行业分布</div>
                <p class="small text-muted">毕业生就业行业分布统计</p>
            </a>
        </div>

        <div class="col-md-4 mb-4">
            <a href="{{ url_for('analysis.region') }}" class="card stat-card text-decoration-none">
                <div class="stat-icon text-warning"><i class="bi bi-geo-alt"></i></div>
                <div class="stat-label mt-3">地区分布</div>
                <p class="small text-muted">毕业生就业地区分布统计</p>
            </a>
        </div>

        <div class="col-md-4 mb-4">
            <a href="{{ url_for('analysis.trend') }}" class="card stat-card text-decoration-none">
                <div class="stat-icon text-danger"><i class="bi bi-graph-up-arrow"></i></div>
                <div class="stat-label mt-3">历年趋势</div>
                <p class="small text-muted">历年就业率、薪资变化趋势</p>
            </a>
        </div>
    </div>
</div>
{% endblock %}
